name: 'Gravwell Kit Manager'
description: 'Manage Gravwell kits by pulling from or pushing to a remote Gravwell instance'

inputs:
  operation:
    description: 'Operation to perform: "pull" or "push"'
    required: true
  go-version:
    description: 'Go version to use for building tools'
    required: false
    default: '1.26.0'
  ignore-cert:
    description: 'Ignore TLS certificate errors when connecting to the Gravwell instance'
    required: false
    default: 'false'
  kit-global:
    description: 'Deploy kit with global access (push only)'
    required: false
    default: 'false'
  kit-write-global:
    description: 'Deploy kit with global write access (push only)'
    required: false
    default: 'false'
  kit-groups:
    description: 'Comma separated list of groups to deploy the kit to (push only)'
    required: false
    default: ''
  kit-write-groups:
    description: 'Comma separated list of groups with write access (push only)'
    required: false
    default: ''
  kit-labels:
    description: 'Comma separated list of labels for the kit (push only)'
    required: false
    default: ''
  kit-force-install:
    description: 'Force install kit even if newer kit already exists (push only)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        if [[ "${{ inputs.operation }}" != "pull" && "${{ inputs.operation }}" != "push" ]]; then
          echo "::error::Invalid operation '${{ inputs.operation }}'. Must be 'pull' or 'push'."
          exit 1
        fi
        if [[ -z "${GRAVWELL_HOST}" ]]; then
          echo "::error::GRAVWELL_HOST environment variable is not set."
          exit 1
        fi
        if [[ -z "${GRAVWELL_TOKEN}" ]]; then
          echo "::error::GRAVWELL_TOKEN environment variable is not set."
          exit 1
        fi
        if [[ -z "${GRAVWELL_KIT_ID}" ]]; then
          echo "::error::GRAVWELL_KIT_ID environment variable is not set."
          exit 1
        fi
        if [[ -z "${GRAVWELL_KIT_DIR}" ]]; then
          echo "::error::GRAVWELL_KIT_DIR environment variable is not set."
          exit 1
        fi

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '${{ inputs.go-version }}'
        cache: false

    - name: Build kitctl
      shell: bash
      run: |
        echo "::group::Building kitctl"
        go install github.com/gravwell/gravwell/v3/kitctl@latest
        echo "::endgroup::"

    - name: Build kitmanager
      shell: bash
      run: |
        echo "::group::Building kitmanager"
        go install github.com/gravwell/gravwell/v3/tools/actions/kitmanager@latest
        echo "::endgroup::"

    - name: Run kit operation
      shell: bash
      env:
        GRAVWELL_KITCTL: ${{ github.action_path }}/kitctl
        GRAVWELL_KIT_GLOBAL: ${{ inputs.kit-global }}
        GRAVWELL_KIT_WRITE_GLOBAL: ${{ inputs.kit-write-global }}
        GRAVWELL_KIT_GROUPS: ${{ inputs.kit-groups }}
        GRAVWELL_KIT_WRITE_GROUPS: ${{ inputs.kit-write-groups }}
        GRAVWELL_KIT_LABELS: ${{ inputs.kit-labels }}
        GRAVWELL_KIT_FORCE_INSTALL: ${{ inputs.kit-force-install }}
      run: |
        # Locate the installed binaries
        KITCTL_PATH="$(go env GOPATH)/bin/kitctl"
        KITMANAGER_PATH="$(go env GOPATH)/bin/kitmanager"

        if [[ ! -x "${KITCTL_PATH}" ]]; then
          echo "::error::kitctl binary not found at ${KITCTL_PATH}"
          exit 1
        fi
        if [[ ! -x "${KITMANAGER_PATH}" ]]; then
          echo "::error::kitmanager binary not found at ${KITMANAGER_PATH}"
          exit 1
        fi

        export GRAVWELL_KITCTL="${KITCTL_PATH}"

        EXTRA_FLAGS=""
        if [[ "${{ inputs.ignore-cert }}" == "true" ]]; then
          EXTRA_FLAGS="-ignore-cert"
        fi

        echo "Running kitmanager ${{ inputs.operation }}"
        "${KITMANAGER_PATH}" ${EXTRA_FLAGS} ${{ inputs.operation }}

    - name: Create or sync kit-manage-sync branch
      if: inputs.operation == 'pull'
      shell: bash
      run: |
        cd "${{ github.workspace }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
        SYNC_BRANCH="kit-manage-sync"

        # Fetch latest remote state
        git fetch origin

        # Check if the sync branch already exists on the remote
        if git ls-remote --exit-code --heads origin "${SYNC_BRANCH}" >/dev/null 2>&1; then
          # Branch exists — reset it to match the default branch
          git checkout -B "${SYNC_BRANCH}" "origin/${DEFAULT_BRANCH}"
        else
          # Branch does not exist — create it from the default branch
          git checkout -b "${SYNC_BRANCH}" "origin/${DEFAULT_BRANCH}"
        fi

    - name: Commit and push to kit-manage-sync
      if: inputs.operation == 'pull'
      shell: bash
      run: |
        cd "${{ github.workspace }}"
        git add -A
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "kit: sync from Gravwell (pull)"
          git push --force origin kit-manage-sync
        fi

    - name: Create pull request
      if: inputs.operation == 'pull'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        cd "${{ github.workspace }}"

        # Check if there are any commits to propose
        if git diff --quiet "origin/${{ github.event.repository.default_branch }}" kit-manage-sync; then
          echo "No differences between kit-manage-sync and ${{ github.event.repository.default_branch }}, skipping PR creation"
          exit 0
        fi

        # Check if an open PR already exists for this branch
        EXISTING_PR=$(gh pr list --head kit-manage-sync --state open --json number --jq '.[0].number // empty')
        if [[ -n "${EXISTING_PR}" ]]; then
          echo "Pull request #${EXISTING_PR} already exists, it has been updated with the latest changes"
        else
          gh pr create \
            --title "kit: sync from Gravwell (pull)" \
            --body "Automated pull request created by kit-manage action to sync kit contents from Gravwell." \
            --base "${{ github.event.repository.default_branch }}" \
            --head kit-manage-sync
          echo "Pull request created"
        fi
