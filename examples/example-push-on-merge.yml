# Example workflow: Automatic push on merge to main
#
# ╔═══════════════════════════════════════════════════════════════════════╗
# ║  ⚠  WARNING - USE WITH CAUTION                                      ║
# ║                                                                      ║
# ║  This workflow automatically pushes kit changes to a live Gravwell   ║
# ║  instance every time a commit is merged to main. This means that     ║
# ║  any merged change—including mistakes—will immediately be deployed   ║
# ║  to the target system.                                               ║
# ║                                                                      ║
# ║  Before enabling this workflow, ensure:                              ║
# ║   • Branch protection rules require PR reviews before merging        ║
# ║   • The target Gravwell instance is NOT a production system, or      ║
# ║     you have a tested rollback strategy                              ║
# ║   • Contributors understand that merging == deploying                ║
# ║                                                                      ║
# ║  Consider using the manual push workflow (example-push.yml) instead  ║
# ║  for safer, human-gated deployments.                                 ║
# ╚═══════════════════════════════════════════════════════════════════════╝
#
# Required repository configuration:
#   Secrets:
#     GRAVWELL_TOKEN  - API token for authenticating with the Gravwell instance
#
#   Variables:
#     GRAVWELL_HOST   - URL of the Gravwell instance (e.g. https://gravwell.example.com)
#     GRAVWELL_KIT_ID - Kit build ID on the remote Gravwell system
#

name: 'Kit Push on Merge'

on:
  push:
    branches:
      - main
    paths:
      - '*'

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      GRAVWELL_HOST: ${{ vars.GRAVWELL_HOST }}
      GRAVWELL_TOKEN: ${{ secrets.GRAVWELL_TOKEN }}
      GRAVWELL_KIT_ID: ${{ vars.GRAVWELL_KIT_ID }}
      GRAVWELL_KIT_DIR: ${{ github.workspace }}/kit
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Push kit to Gravwell
        uses: gravwell/kit-manage@v1
        with:
          operation: push
